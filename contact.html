  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #333;
    }
    nav {
      background: #f06c9b;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }
    .contact-section {
      padding: 60px 20px;
      max-width: 800px;
      margin: auto;
    }
    .contact-section h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #f06c9b;
      font-size: 2.5rem;
    }
    form {
      background: #fefefe;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      background: #f06c9b;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
      width: 100%;
    }
    .details {
      margin-top: 40px;
      text-align: center;
      font-size: 1rem;
    }
    .details i {
      color: #f06c9b;
      margin-right: 8px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>
