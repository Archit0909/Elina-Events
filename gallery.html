<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery | Elina Events</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #333;
    }
    nav {
      background: #f06c9b;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }
    .gallery-section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
      text-align: center;
    }
    .gallery-section h1 {
      color: #f06c9b;
      margin-bottom: 30px;
      font-size: 2.5rem;
    }
    h2 {
      margin: 40px 0 20px;
      font-size: 1.6rem;
      color: #444;
      border-bottom: 2px solid #f06c9b;
      display: inline-block;
      padding-bottom: 5px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .gallery-grid img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }
    .gallery-grid img:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <nav>
    <div style="font-weight: bold; font-size: 1.2rem;">Elina Events</div>
    <div>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="gallery.html">Gallery</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <section class="gallery-section">
    <h1>Event Gallery</h1>

    <h2>🎂 Birthday Parties</h2>
    <div class="gallery-grid">
      <img src="https://picsum.photos/seed/birthday1/600/400" alt="Birthday 1">
      <img src="https://picsum.photos/seed/birthday2/600/400" alt="Birthday 2">
      <img src="https://picsum.photos/seed/birthday3/600/400" alt="Birthday 3">
    </div>

    <h2>🎶 Musical Events</h2>
    <div class="gallery-grid">
      <img src="https://picsum.photos/seed/music1/600/400" alt="Musical 1">
      <img src="https://picsum.photos/seed/music2/600/400" alt="Musical 2">
      <img src="https://picsum.photos/seed/music3/600/400" alt="Musical 3">
    </div>

    <h2>💍 Engagement Ceremonies</h2>
    <div class="gallery-grid">
      <img src="https://picsum.photos/seed/engage1/600/400" alt="Engagement 1">
      <img src="https://picsum.photos/seed/engage2/600/400" alt="Engagement 2">
      <img src="https://picsum.photos/seed/engage3/600/400" alt="Engagement 3">
    </div>

  </section>

  <footer>
    &copy; 2025 Elina Events. All rights reserved.
  </footer>

</body>
</html>
